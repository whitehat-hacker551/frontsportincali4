<div class="container my-4 edit-form">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="form-card">
        <header class="mb-4">
          <h1 class="h3 mb-0">Editar puntuación</h1>
        </header>

        @if (loading()) {
          <div class="d-flex justify-content-center my-5">
            <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Cargando...</span></div>
          </div>
        }

        @if (error()) {
          <div class="alert alert-danger" role="alert"><i class="bi bi-exclamation-triangle me-2"></i>{{ error() }}</div>
        }

        @if (!loading() && !error() && puntuacion()) {
          <app-puntuacion-admin-form
            [puntuacion]="puntuacion()"
            [isEditMode]="true"
            (formSuccess)="onFormSuccess()"
            (formCancel)="onFormCancel()"
          ></app-puntuacion-admin-form>
        }
      </div>
    </div>
  </div>
</div>
