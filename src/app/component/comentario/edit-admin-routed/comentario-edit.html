<div class="container my-4 edit-form">
  @if (oLoading()) {
    <div class="d-flex justify-content-center my-5">
      <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Cargando...</span></div>
    </div>
  }

  @if (oError()) {
    <div class="alert alert-danger">{{ oError() }}</div>
  }

  @if (!oLoading() && !oError()) {
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="form-card">
          <header class="mb-4">
            <h1 class="h3 mb-0">Editar comentario</h1>
          </header>
          <app-comentario-form-unrouted [comentario]="oComentario()" [mode]="'edit'" (formSuccess)="onSuccess()" (formCancel)="onCancel()"></app-comentario-form-unrouted>
        </div>
      </div>
    </div>
  }
</div>
