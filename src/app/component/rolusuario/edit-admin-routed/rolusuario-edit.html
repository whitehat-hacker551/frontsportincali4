<div class="container my-4 edit-form">
  @if (loading()) {
    <div class="d-flex justify-content-center my-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>
  }

  @if (error() && !loading()) {
    <div class="alert alert-danger" role="alert">
      <i class="bi bi-exclamation-triangle me-2"></i>{{ error() }}
    </div>
  }

  @if (!loading() && !error()) {
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="form-card">
          <header class="mb-4">
            <h1 class="h3 mb-0"><i class="bi bi-pencil-square me-2"></i>Editar Rol de Usuario</h1>
          </header>
          <app-rolusuario-form-unrouted [rolusuario]="rolusuario()" mode="edit" (formSuccess)="onFormSuccess()" (formCancel)="onFormCancel()"></app-rolusuario-form-unrouted>
        </div>
      </div>
    </div>
  }
</div>
