<div class="container my-2">
  <div class="d-flex justify-content-center my-3">
    <h1 class="mb-0"><i class="bi bi-file-earmark me-2" aria-hidden="true"></i>Facturas</h1>
  </div>

  <div class="d-flex justify-content-between align-items-center gap-2 mb-3 flex-wrap">
    <small class="text-muted">Total registros: {{ totalRecords() || 0 }}</small>
    <a
      *ngIf="!session.isClubAdmin()"
      class="btn btn-primary"
      [routerLink]="['/factura/new']"
      role="button"
      >
      <i class="bi bi-plus-circle"></i>
      <span class="d-none d-sm-inline">Crear factura</span>
    </a>
  </div>

  <div class="mb-3">
    <input
      type="text"
      class="form-control"
      placeholder="Buscar..."
      (input)="onSearchDescripcion($any($event.target).value)"
    />
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-bordered table-sm w-100">
      <thead>
        <tr>
          <th scope="col" (click)="onOrder('id')" style="cursor: pointer; width: 8%">ID</th>
          <th scope="col" (click)="onOrder('fecha')" style="cursor: pointer; width: 20%">Fecha</th>
          <th scope="col" (click)="onOrder('id_usuario')" style="cursor: pointer; width: 30%">Usuario</th>
          <th scope="col" (click)="onOrder('compras')" style="cursor: pointer; width: 15%">Compras</th>
          <th scope="col" class="text-center" style="width: 15%">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (oFactura of oPage()?.content; track oFactura.id) {
          <tr>
            <th scope="row" class="text-center">{{ oFactura.id }}</th>
            <td>{{ oFactura.fecha }}</td>
            <td>{{ oFactura.usuario?.nombre || 'N/A' }}</td>
            <td class="text-center">{{ oFactura.compras }}</td>
            <td class="text-center">
              <app-botonera-actions-plist [id]="oFactura.id" strEntity="factura"></app-botonera-actions-plist>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  @if (totalRecords() > 0) {
    <div class="d-flex justify-content-between align-items-center mb-3">
      <app-paginacion
        [numPage]="numPage()"
        [numPages]="oPage()?.totalPages || 1"
        (pageChange)="goToPage($event)"
      ></app-paginacion>
      <app-botonera-rpp
        [numRpp]="numRpp()"
        (rppChange)="onRppChange($event)"
      ></app-botonera-rpp>
    </div>
  }
</div>
