@if (loading()) {
  <div class="d-flex justify-content-center my-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>
}

@if (error()) {
  <div class="alert alert-danger" role="alert">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ error() }}
  </div>
}

<form [formGroup]="partidoForm" (ngSubmit)="onSubmit()" novalidate>
  <div class="mb-4">
    <label for="id" class="form-label">ID del partido</label>
    <input type="text" class="form-control" id="id" formControlName="id" readonly />
  </div>

  <div class="mb-4">
    <label for="rival" class="form-label">Rival <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="rival" formControlName="rival" />
  </div>

  <div class="mb-4">
    <label for="liga" class="form-label">Liga <span class="text-danger">*</span></label>
    <select id="liga" class="form-select" formControlName="id_liga">
      <option [value]="null" disabled>Selecciona una liga</option>
      @for (l of ligas(); track l.id) {
        <option [value]="l.id">{{ l.nombre }}</option>
      }
    </select>
  </div>

  <div class="mb-4">
    <label for="local" class="form-label">Local <span class="text-danger">*</span></label>
    <select id="local" class="form-select" formControlName="local">
      <option [value]="0">Visitante</option>
      <option [value]="1">Local</option>
    </select>
  </div>

  <div class="mb-4">
    <label for="resultado" class="form-label">Resultado <span class="text-danger">*</span></label>
    <input type="text" class="form-control" id="resultado" formControlName="resultado" />
  </div>

  <div class="d-flex justify-content-between align-items-center mt-4">
    <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">Cancelar</button>
    <button type="submit" class="btn btn-primary" [disabled]="submitting() || partidoForm.invalid">
      @if (submitting()) {
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
      }
      Guardar
    </button>
  </div>
</form>
