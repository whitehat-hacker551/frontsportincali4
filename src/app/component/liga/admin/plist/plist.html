<div class="container my-2">
  <div class="d-flex justify-content-center my-3">
    <h1 class="mb-0"><i class="bi bi-flag-fill me-2" aria-hidden="true"></i>Ligas</h1>
  </div>

  <div class="d-flex justify-content-center my-1">
    <small class="text-muted">Total registros: {{ totalRecords() || 0 }}</small>
    @if (equipo && equipo > 0) {
      <small class="text-muted ms-3">Filtro: id de equipo = {{ equipo }}</small>
      <a class="ms-2" [routerLink]="['/liga']" role="button" title="Quitar filtro">
        <i class="bi bi-x-lg" aria-hidden="true"></i> Quitar filtro
      </a>
    }
  </div>

  <div class="d-flex justify-content-center my-2">
    <a *ngIf="!session.isClubAdmin()" class="btn btn-primary new-btn" [routerLink]="['/liga/new']" role="button">
      <i class="bi bi-plus-circle" aria-hidden="true"></i>
      <span class="d-none d-sm-inline">Crear liga</span>
    </a>
  </div>

  <div class="d-flex justify-content-center">
    <div class="table-responsive w-100">
      <table class="table table-striped table-bordered table-sm w-100">
        <thead>
          <tr>
            <th scope="col" (click)="onOrder('id')" style="cursor: pointer; width: 5%">ID</th>
            <th scope="col" (click)="onOrder('nombre')" style="cursor: pointer; width: 45%">Nombre</th>
            <th scope="col" style="width: 20%">Equipo</th>
            <th scope="col" class="text-center" style="width: 20%">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (liga of oPage()?.content; track liga.id) {
            <tr>
              <th scope="row" class="text-center">{{ liga.id }}</th>
              <td>{{ liga.nombre }}</td>
              <td>
                <a [routerLink]="['/equipo/view', liga.equipo.id]">{{ liga.equipo.nombre }}</a>
              </td>
              <td class="text-center">
                <app-botonera-actions-plist [id]="liga.id" strEntity="liga"></app-botonera-actions-plist>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
