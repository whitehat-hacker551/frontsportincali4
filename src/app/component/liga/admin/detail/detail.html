<div class="container py-3">
  <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 border rounded bg-light p-2 mb-3">
    <div>
      <div class="text-uppercase small text-muted fw-semibold">Ligas</div>
      <div class="fw-bold">Detalle de liga</div>
      <div class="text-muted small">Panel administrativo</div>
    </div>
    <a class="btn btn-outline-secondary btn-sm d-inline-flex align-items-center gap-2" routerLink="/liga">
      <i class="bi bi-arrow-left"></i>Volver
    </a>
  </div>

  @if (loading()) {
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center py-3">
        <div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Cargando...</span></div>
      </div>
    </div>
  }

  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }

  @if (!loading() && !error() && oLiga()) {
    <div class="card border">
      <div class="card-body">
        <div><strong>ID:</strong> {{ oLiga()?.id }}</div>
        <div><strong>Nombre:</strong> {{ oLiga()?.nombre }}</div>
        <div><strong>Equipo:</strong> <a [routerLink]="['/equipo/view', oLiga()?.equipo?.id]">{{ oLiga()?.equipo?.nombre }}</a></div>
      </div>
    </div>
  }
</div>
